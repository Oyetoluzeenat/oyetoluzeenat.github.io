<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} · Zeenat Y. Oyetolu</title>
  <meta name="description" content="{{ page.description | default: page.title }}">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:type" content="article">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2305192d'/%3E%3Cpath d='M4 17h6l3-7 4 13 3-9h8' fill='none' stroke='%2310cf74' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#05192d;--ink-2:#0a233c;--paper:#f5f8fa;--signal:#10cf74;--signal-deep:#0a8f50;--text:#1d3346;--muted:#5b6b7b;--line:rgba(5,25,45,.12)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,-apple-system,sans-serif;background:var(--paper);color:var(--text);line-height:1.75}
    img{max-width:100%;height:auto;border-radius:10px;border:1px solid var(--line);margin:22px 0;display:block}
    a{color:var(--signal-deep)}
    .topbar{position:sticky;top:0;background:rgba(5,25,45,.94);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.08)}
    .topbar .in{max-width:780px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:9px;color:#fff;text-decoration:none;font-family:'Space Grotesk';font-weight:600}
    .brand svg{width:24px;height:24px}
    .topbar a.back{color:var(--signal);text-decoration:none;font-size:14px;font-weight:600}
    .hero{background:linear-gradient(180deg,var(--ink),var(--ink-2));color:#fff;padding:54px 24px 46px}
    .hero .in{max-width:780px;margin:0 auto}
    .hero .eyebrow{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--signal)}
    .hero h1{font-family:'Space Grotesk';font-weight:700;font-size:clamp(26px,4.6vw,40px);line-height:1.15;margin-top:12px;letter-spacing:-.01em}
    .hero .meta{color:#9fb3c4;font-size:14px;margin-top:14px;font-family:'JetBrains Mono',monospace}
    article{max-width:780px;margin:0 auto;padding:46px 24px 70px}
    article h1{font-family:'Space Grotesk';font-size:28px;color:var(--ink);margin:38px 0 14px;letter-spacing:-.01em}
    article h2{font-family:'Space Grotesk';font-size:23px;color:var(--ink);margin:34px 0 12px;padding-top:8px;border-top:1px solid var(--line)}
    article h3{font-family:'Space Grotesk';font-size:18px;color:var(--ink-2);margin:24px 0 8px}
    article p{margin:14px 0}
    article ul,article ol{margin:14px 0 14px 22px}
    article li{margin:6px 0}
    article strong{color:var(--ink)}
    article code{font-family:'JetBrains Mono',monospace;font-size:.88em;background:#eef2f5;border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:#0a2942}
    article pre{background:var(--ink);color:#dfe9f0;padding:18px;border-radius:10px;overflow-x:auto;margin:18px 0}
    article pre code{background:none;border:0;color:inherit;padding:0}
    article blockquote{border-left:3px solid var(--signal);background:#fff;margin:18px 0;padding:12px 18px;border-radius:0 8px 8px 0;color:#33495d}
    article hr{border:0;border-top:1px solid var(--line);margin:30px 0}
    .endnav{max-width:780px;margin:0 auto;padding:0 24px 60px}
    .endnav a{display:inline-block;background:var(--ink);color:#fff;text-decoration:none;font-weight:600;padding:12px 22px;border-radius:10px;transition:.2s}
    .endnav a:hover{background:var(--signal);color:var(--ink)}
    footer{background:var(--ink-2);color:#9fb3c4;text-align:center;padding:24px;font-size:13px}
  </style>
</head>
<body>
  <div class="topbar"><div class="in">
    <a class="brand" href="{{ site.url }}/">
      <svg viewBox="0 0 32 32"><rect width="32" height="32" rx="7" fill="#0a233c"/><path d="M4 17h6l3-7 4 13 3-9h8" fill="none" stroke="#10cf74" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Zeenat Oyetolu
    </a>
    <a class="back" href="{{ site.url }}/#projects">← All projects</a>
  </div></div>

  <header class="hero"><div class="in">
    <span class="eyebrow">Project write-up</span>
    <h1>{{ page.title }}</h1>
    <div class="meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.categories %} · {{ page.categories | join: " / " }}{% endif %}</div>
  </div></header>

  <article>
    {{ content }}
  </article>

  <div class="endnav"><a href="{{ site.url }}/#projects">← Back to portfolio</a></div>
  <footer>© 2026 Zeenat Y. Oyetolu · Hosted on GitHub Pages</footer>
</body>
</html>
